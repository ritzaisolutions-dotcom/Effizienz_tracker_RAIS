<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RAIS Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* CSS VARIABLES */
    :root {
      --bg:       #0A0A0A;
      --surface:  #141618;
      --border:   #222426;
      --text:     #F0F0F0;
      --muted:    #888;
      --accent:   #C8FF00;
      --green:    #22C55E;
      --yellow:   #EAB308;
      --red:      #EF4444;
      --font-ui:  'Outfit', sans-serif;
      --font-mono:'Space Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      gap: 2rem;
    }

    .login-logo {
      font-family: var(--font-mono);
      font-size: 1.2rem;
      letter-spacing: 0.3em;
      color: var(--accent);
    }

    .login-form {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .login-form input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-form input:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 1rem;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:active { opacity: 0.7; }

    .login-error {
      color: var(--red);
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2em;
    }

    /* ── APP SHELL ── */
    #app-shell { display: none; }
    #app-shell.visible { display: block; }

    /* Top Bar */
    .topbar {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .topbar-logo {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: var(--accent);
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: var(--font-ui);
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-logout:hover { color: var(--text); border-color: var(--text); }

    /* Tab Content Area */
    .tab-content {
      padding: 1.25rem;
      padding-bottom: 6rem;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 200;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.65rem 0.25rem;
      cursor: pointer;
      gap: 0.25rem;
      border: none;
      background: none;
      color: var(--muted);
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-item svg { width: 20px; height: 20px; }
    .nav-item.active { color: var(--accent); }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── SHARED COMPONENTS ── */
    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-logo">RAIS TRACKER</div>
  <div class="login-form">
    <input type="email" id="login-email" placeholder="Email" autocomplete="email">
    <input type="password" id="login-password" placeholder="Passwort" autocomplete="current-password">
    <button class="btn-primary" onclick="handleLogin()">Einloggen</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell">
  <div class="topbar">
    <span class="topbar-logo">RAIS</span>
    <button class="btn-logout" onclick="handleLogout()">Logout</button>
  </div>

  <div class="tab-content">
    <div class="tab-panel active" id="tab-overview"></div>

    <div class="tab-panel" id="tab-deepwork">
      <!-- IDLE STATE -->
      <div id="dw-idle" class="dw-state">
        <div class="section-title">Deep Work Session</div>
        <div class="card" style="text-align:center; padding: 2.5rem 1.25rem;">
          <div style="font-size:0.8rem; color:var(--muted); margin-bottom:2rem; letter-spacing:0.1em;">
            BEREIT ZU STARTEN
          </div>
          <button class="btn-primary" onclick="dwStart()" style="max-width:200px; margin:0 auto;">
            ▶ SESSION STARTEN
          </button>
        </div>
        <div class="section-title" style="margin-top:1.5rem;">HEUTE</div>
        <div id="dw-today-list"></div>
        <div id="dw-today-total" style="color:var(--muted); font-size:0.85rem; margin-top:0.5rem;"></div>
      </div>

      <!-- ACTIVE/PAUSED STATE -->
      <div id="dw-running" class="dw-state hidden">
        <div class="card">
          <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.5rem; text-align:center; margin-bottom:1.5rem;">
            <div>
              <div style="font-size:0.6rem; letter-spacing:0.15em; color:var(--muted); margin-bottom:0.4rem;">GESAMT</div>
              <div id="dw-total" style="font-family:var(--font-mono); font-size:1.4rem; color:var(--text);">00:00:00</div>
            </div>
            <div>
              <div style="font-size:0.6rem; letter-spacing:0.15em; color:var(--accent); margin-bottom:0.4rem;">FOKUS</div>
              <div id="dw-focus" style="font-family:var(--font-mono); font-size:1.4rem; color:var(--accent);">00:00:00</div>
            </div>
            <div>
              <div style="font-size:0.6rem; letter-spacing:0.15em; color:var(--muted); margin-bottom:0.4rem;">PAUSE</div>
              <div id="dw-pause" style="font-family:var(--font-mono); font-size:1.4rem; color:var(--muted);">00:00:00</div>
            </div>
          </div>
          <div id="dw-status-indicator" style="text-align:center; font-size:0.75rem; letter-spacing:0.15em; color:var(--accent); margin-bottom:1.5rem;">
            ● AKTIV
          </div>
          <input type="text" id="dw-label-input" placeholder="Label (optional) — z.B. CRM Bugfix"
            style="background:var(--bg); border:1px solid var(--border); border-radius:8px;
                   padding:0.75rem; color:var(--text); font-family:var(--font-ui);
                   font-size:0.9rem; width:100%; margin-bottom:1rem; outline:none;">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
            <button id="dw-pause-btn" onclick="dwTogglePause()"
              style="background:var(--surface); border:1px solid var(--border); border-radius:8px;
                     padding:1rem; color:var(--text); font-family:var(--font-ui); font-size:0.9rem;
                     cursor:pointer; font-weight:500;">
              ⏸ PAUSE
            </button>
            <button onclick="dwEnd()"
              style="background:transparent; border:1px solid var(--red); border-radius:8px;
                     padding:1rem; color:var(--red); font-family:var(--font-ui); font-size:0.9rem;
                     cursor:pointer; font-weight:500;">
              ⏹ BEENDEN
            </button>
          </div>
        </div>
      </div>

      <!-- SUMMARY MODAL -->
      <div id="dw-summary-modal" class="hidden"
        style="position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:300;
               display:flex; align-items:flex-end; justify-content:center;">
        <div style="background:var(--surface); border-radius:16px 16px 0 0; padding:2rem;
                    width:100%; max-width:480px; border-top:1px solid var(--border);">
          <div style="font-size:0.7rem; letter-spacing:0.2em; color:var(--muted); margin-bottom:1.5rem;">
            SESSION ZUSAMMENFASSUNG
          </div>
          <div id="dw-summary-content" style="margin-bottom:1.5rem;"></div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
            <button onclick="dwDiscard()"
              style="background:transparent; border:1px solid var(--border); border-radius:8px;
                     padding:1rem; color:var(--muted); font-family:var(--font-ui); cursor:pointer;">
              Verwerfen
            </button>
            <button onclick="dwSave()"
              style="background:var(--accent); border:none; border-radius:8px;
                     padding:1rem; color:#000; font-family:var(--font-ui);
                     font-weight:600; cursor:pointer;">
              Speichern
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="tab-training">
      <!-- IDLE STATE -->
      <div id="tr-idle" class="tr-state">
        <div class="section-title">Training Session</div>
        <div id="tr-muscle-picker" class="card">
          <div style="font-size:0.75rem; color:var(--muted); margin-bottom:1rem; letter-spacing:0.1em;">MUSKELGRUPPE WÄHLEN</div>
          <div id="tr-muscle-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-bottom:1rem;"></div>
          <button class="btn-primary" onclick="trStart()" id="tr-start-btn" disabled style="opacity:0.4; cursor:not-allowed;">
            ▶ TRAINING STARTEN
          </button>
        </div>
        <div class="section-title" style="margin-top:1.5rem;">HEUTE</div>
        <div id="tr-today-list"></div>
      </div>

      <!-- RUNNING STATE -->
      <div id="tr-running" class="tr-state hidden">
        <div class="card">
          <div style="font-size:0.75rem; color:var(--muted); margin-bottom:0.5rem; letter-spacing:0.1em;" id="tr-muscle-display"></div>
          <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.5rem; text-align:center; margin-bottom:1.5rem;">
            <div>
              <div style="font-size:0.6rem; letter-spacing:0.15em; color:var(--muted); margin-bottom:0.4rem;">GESAMT</div>
              <div id="tr-total" style="font-family:var(--font-mono); font-size:1.4rem; color:var(--text);">00:00:00</div>
            </div>
            <div>
              <div style="font-size:0.6rem; letter-spacing:0.15em; color:var(--green); margin-bottom:0.4rem;">AKTIV</div>
              <div id="tr-active" style="font-family:var(--font-mono); font-size:1.4rem; color:var(--green);">00:00:00</div>
            </div>
            <div>
              <div style="font-size:0.6rem; letter-spacing:0.15em; color:var(--muted); margin-bottom:0.4rem;">PAUSE</div>
              <div id="tr-pause" style="font-family:var(--font-mono); font-size:1.4rem; color:var(--muted);">00:00:00</div>
            </div>
          </div>
          <div id="tr-status-indicator" style="text-align:center; font-size:0.75rem; letter-spacing:0.15em; color:var(--green); margin-bottom:1.5rem;">● TRAINING AKTIV</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
            <button id="tr-pause-btn" onclick="trTogglePause()"
              style="background:var(--surface); border:1px solid var(--border); border-radius:8px;
                     padding:1rem; color:var(--text); font-family:var(--font-ui); font-size:0.9rem; cursor:pointer;">
              ⏸ PAUSE
            </button>
            <button onclick="trEnd()"
              style="background:transparent; border:1px solid var(--red); border-radius:8px;
                     padding:1rem; color:var(--red); font-family:var(--font-ui); font-size:0.9rem; cursor:pointer;">
              ⏹ FERTIG
            </button>
          </div>
        </div>
      </div>

      <!-- SUMMARY MODAL -->
      <div id="tr-summary-modal" class="hidden"
        style="position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:300;
               display:flex; align-items:flex-end; justify-content:center;">
        <div style="background:var(--surface); border-radius:16px 16px 0 0; padding:2rem;
                    width:100%; max-width:480px; border-top:1px solid var(--border);">
          <div style="font-size:0.7rem; letter-spacing:0.2em; color:var(--muted); margin-bottom:1.5rem;">TRAINING ZUSAMMENFASSUNG</div>
          <div id="tr-summary-content" style="margin-bottom:1.5rem;"></div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
            <button onclick="trDiscard()"
              style="background:transparent; border:1px solid var(--border); border-radius:8px;
                     padding:1rem; color:var(--muted); font-family:var(--font-ui); cursor:pointer;">
              Verwerfen
            </button>
            <button onclick="trSave()"
              style="background:var(--green); border:none; border-radius:8px;
                     padding:1rem; color:#000; font-family:var(--font-ui); font-weight:600; cursor:pointer;">
              Speichern
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="tab-outreach"></div>
    <div class="tab-panel" id="tab-content"><!-- Session 4 füllt das --></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Overview
    </button>
    <button class="nav-item" data-tab="deepwork">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      Deep Work
    </button>
    <button class="nav-item" data-tab="training">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 4v16M18 4v16M3 8h18M3 16h18"/>
      </svg>
      Training
    </button>
    <button class="nav-item" data-tab="outreach">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
      </svg>
      Outreach
    </button>
    <button class="nav-item" data-tab="content">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      Content
    </button>
  </nav>
</div>

<script>
// ── SUPABASE INIT ──
const { createClient } = supabase;
const SB = createClient(
  'https://qdywaenmojdxhfxqbvun.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkeXdhZW5tb2pkeGhmeHFidnVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDYwMTYsImV4cCI6MjA5MDk4MjAxNn0.rfIzS2eY3yZCvap0pKdB7V-AfKmnvQLx_QLaFEi1gts'
);

// ── SHARED UTILITIES ──
function formatTime(s) {
  const h = Math.floor(s / 3600).toString().padStart(2, '0');
  const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${h}:${m}:${sec}`;
}

function getWeekStart() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(new Date().setDate(diff));
  return monday.toISOString().split('T')[0];
}

// ── AUTH ──
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  const { error } = await SB.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = 'Login fehlgeschlagen. Email oder Passwort falsch.';
  } else {
    showApp();
  }
}

async function handleLogout() {
  await SB.auth.signOut();
  document.getElementById('app-shell').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').classList.add('visible');
  initTabs();
  loadOverview();
  loadDWToday();
  initMusclePicker();
}

function initTabListeners() {
  document.querySelector('[data-tab="training"]').addEventListener('click', () => {
    if (trState === 'idle') initMusclePicker();
    loadTRToday();
  });
  document.querySelector('[data-tab="outreach"]').addEventListener('click', () => {
    loadOutreach('today');
  });
}

// ── TAB NAVIGATION ──
function initTabs() {
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    });
  });
}

// ── BOOT ──
SB.auth.getSession().then(({ data: { session } }) => {
  if (session) showApp();
});
initTabListeners();

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

// ── TRAINING STATE ──
const MUSCLE_GROUPS = ['Brust', 'Rücken', 'Schultern', 'Arme', 'Beine', 'Core', 'Cardio', 'Full Body'];

let trState = 'idle';
let trTotalSeconds = 0;
let trActiveSeconds = 0;
let trTotalInterval = null;
let trActiveInterval = null;
let trStartedAt = null;
let trCurrentSessionId = null;
let trSelectedMuscle = null;

function trStart() {
  if (!trSelectedMuscle) return;
  trState = 'active';
  trStartedAt = new Date();
  trTotalSeconds = 0;
  trActiveSeconds = 0;
  trTotalInterval = setInterval(() => { trTotalSeconds++; renderTRTimers(); }, 1000);
  trActiveInterval = setInterval(() => { trActiveSeconds++; }, 1000);
  trCreateSession();
  renderTRState();
  document.getElementById('tr-muscle-picker').classList.add('hidden');
  document.getElementById('tr-muscle-display').textContent = trSelectedMuscle.toUpperCase();
}

function trPause() {
  if (trState !== 'active') return;
  trState = 'paused';
  clearInterval(trActiveInterval);
  renderTRState();
}

function trResume() {
  if (trState !== 'paused') return;
  trState = 'active';
  trActiveInterval = setInterval(() => { trActiveSeconds++; }, 1000);
  renderTRState();
}

function trEnd() {
  clearInterval(trTotalInterval);
  clearInterval(trActiveInterval);
  trState = 'idle';
  showTRSummaryModal();
}

function renderTRTimers() {
  document.getElementById('tr-total').textContent = formatTime(trTotalSeconds);
  document.getElementById('tr-active').textContent = formatTime(trActiveSeconds);
  document.getElementById('tr-pause').textContent = formatTime(trTotalSeconds - trActiveSeconds);
}

function renderTRState() {
  const idle = document.getElementById('tr-idle');
  const running = document.getElementById('tr-running');
  const pauseBtn = document.getElementById('tr-pause-btn');
  const statusEl = document.getElementById('tr-status-indicator');
  if (trState === 'idle') {
    idle.classList.remove('hidden');
    running.classList.add('hidden');
    trSelectedMuscle = null;
    document.getElementById('tr-muscle-picker').classList.remove('hidden');
  } else {
    idle.classList.add('hidden');
    running.classList.remove('hidden');
  }
  if (trState === 'paused') {
    pauseBtn.textContent = '▶ WEITER';
    statusEl.style.color = 'var(--yellow)';
    statusEl.textContent = '⏸ PAUSE / QUATSCHEN';
  } else if (trState === 'active') {
    pauseBtn.textContent = '⏸ PAUSE';
    statusEl.style.color = 'var(--green)';
    statusEl.textContent = '● TRAINING AKTIV';
  }
}

function trTogglePause() {
  if (trState === 'active') trPause();
  else if (trState === 'paused') trResume();
}

function showTRSummaryModal() {
  const pct = trTotalSeconds > 0 ? Math.round((trActiveSeconds / trTotalSeconds) * 100) : 0;
  document.getElementById('tr-summary-content').innerHTML = `
    <div style="display:flex; flex-direction:column; gap:0.75rem;">
      <div style="display:flex; justify-content:space-between;">
        <span style="color:var(--muted)">Muskelgruppe</span>
        <span style="color:var(--green); font-weight:500;">${trSelectedMuscle}</span>
      </div>
      <div style="display:flex; justify-content:space-between;">

// ── OUTREACH ──
const STATUS_AMPEL = {
  'demo':           { color: 'var(--green)',  label: 'Demo',           tier: 'win' },
  'closing':        { color: 'var(--green)',  label: 'Closing',        tier: 'win' },
  'door_open':      { color: '#86EFAC',       label: 'Door Open',      tier: 'warm' },
  'followup':       { color: 'var(--yellow)', label: 'Follow-up',      tier: 'neutral' },
  'gatekeeper':     { color: 'var(--yellow)', label: 'Gatekeeper',     tier: 'neutral' },
  'nicht_erreicht': { color: 'var(--yellow)', label: 'Nicht erreicht', tier: 'neutral' },
  'kein_anschluss': { color: 'var(--yellow)', label: 'Kein Anschluss', tier: 'neutral' },
  'disqualified':   { color: 'var(--red)',    label: 'Disqualified',   tier: 'dead' },
  'neu':            { color: 'var(--muted)',  label: 'Neu',            tier: 'untouched' },
};

function getStatusColor(s) { return STATUS_AMPEL[s]?.color || 'var(--muted)'; }
function getStatusTier(s)  { return STATUS_AMPEL[s]?.tier  || 'neutral'; }

async function loadOutreach(period = 'today') {
  const now = new Date();
  let fromDate;
  if (period === 'today') {
    fromDate = now.toISOString().split('T')[0] + 'T00:00:00+00:00';
  } else if (period === 'week') {
    fromDate = getWeekStart() + 'T00:00:00+00:00';
  } else {
    fromDate = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0] + 'T00:00:00+00:00';
  }

  const { data: sessions } = await SB
    .from('crm_sessions')
    .select('id, started_at, ended_at, leads_played, status_breakdown, duration_seconds')
    .gte('started_at', fromDate)
    .order('started_at', { ascending: false });

  const sessionIds = (sessions || []).map(s => s.id);
  let events = [];
  if (sessionIds.length > 0) {
    const { data: ev } = await SB
      .from('crm_session_events')
      .select('session_id, status_to, changed_at')
      .in('session_id', sessionIds);
    events = ev || [];
  }

  renderOutreach(sessions || [], events, period);
}

function renderOutreach(sessions, events, period) {
  const totalPlayed = sessions.reduce((s, r) => s + (r.leads_played || 0), 0);
  const breakdown = {};
  events.forEach(e => { breakdown[e.status_to] = (breakdown[e.status_to] || 0) + 1; });

  let wins = 0, warm = 0, neutral = 0, dead = 0;
  Object.entries(breakdown).forEach(([status, count]) => {
    const tier = getStatusTier(status);
    if (tier === 'win') wins += count;
    else if (tier === 'warm') warm += count;
    else if (tier === 'neutral') neutral += count;
    else if (tier === 'dead') dead += count;
  });

  const convRate = totalPlayed > 0 ? ((wins / totalPlayed) * 100).toFixed(1) : '0.0';
  const tabs = ['today', 'week', 'month'];
  const tabLabels = { today: 'Heute', week: 'Woche', month: 'Monat' };

  document.getElementById('tab-outreach').innerHTML = `
    <div style="display:flex; gap:0.5rem; margin-bottom:1.25rem;">
      ${tabs.map(t => `
        <button onclick="loadOutreach('${t}')"
          style="flex:1; padding:0.6rem; border-radius:8px; font-family:var(--font-ui);
                 font-size:0.8rem; cursor:pointer;
                 border:1px solid ${t === period ? 'var(--accent)' : 'var(--border)'};
                 background:${t === period ? 'rgba(200,255,0,0.08)' : 'transparent'};
                 color:${t === period ? 'var(--accent)' : 'var(--muted)'};">
          ${tabLabels[t]}
        </button>
      `).join('')}
    </div>
    <div class="card" style="margin-bottom:0.75rem;">
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.5rem; text-align:center; margin-bottom:1rem;">
        <div>
          <div style="font-size:0.6rem; color:var(--muted); letter-spacing:0.1em; margin-bottom:0.25rem;">SESSIONS</div>
          <div style="font-family:var(--font-mono); font-size:1.5rem;">${sessions.length}</div>
        </div>
        <div>
          <div style="font-size:0.6rem; color:var(--muted); letter-spacing:0.1em; margin-bottom:0.25rem;">GESPIELT</div>
          <div style="font-family:var(--font-mono); font-size:1.5rem;">${totalPlayed}</div>
        </div>
        <div>
          <div style="font-size:0.6rem; color:var(--muted); letter-spacing:0.1em; margin-bottom:0.25rem;">CONV %</div>
          <div style="font-family:var(--font-mono); font-size:1.5rem; color:${wins > 0 ? 'var(--green)' : 'var(--muted)'};">${convRate}%</div>
        </div>
      </div>
      <div style="display:flex; flex-direction:column; gap:0.5rem;">
        ${ampelRow('🟢 Win (Demo / Closing)', wins, totalPlayed, 'var(--green)')}
        ${ampelRow('🟡 Warm (Door Open)', warm, totalPlayed, '#86EFAC')}
        ${ampelRow('🟡 Neutral', neutral, totalPlayed, 'var(--yellow)')}
        ${ampelRow('🔴 Kein Anschluss / DQ', dead, totalPlayed, 'var(--red)')}
      </div>
    </div>
    <div class="section-title">SESSIONS</div>
    ${sessions.length === 0
      ? '<div style="color:var(--muted); font-size:0.85rem;">Keine Sessions in diesem Zeitraum.</div>'
      : sessions.map(s => {
          const sb = s.status_breakdown || {};
          return `
            <div class="card" style="padding:0.85rem 1rem;">
              <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
                <div style="font-size:0.85rem;">${new Date(s.started_at).toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'})}</div>
                <div style="font-size:0.85rem; font-family:var(--font-mono);">${s.leads_played} Leads</div>
              </div>
              <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                ${Object.entries(sb).map(([status, count]) => `
                  <span style="font-size:0.7rem; padding:0.2rem 0.5rem; border-radius:4px;
                               background:rgba(255,255,255,0.05); color:${getStatusColor(status)};">
                    ${count}× ${STATUS_AMPEL[status]?.label || status}
                  </span>
                `).join('')}
              </div>
            </div>
          `;
        }).join('')
    }
  `;
}

function ampelRow(label, count, total, color) {
  const pct = total > 0 ? Math.round((count / total) * 100) : 0;
  return `
    <div style="display:flex; align-items:center; gap:0.75rem;">
      <div style="flex:1; font-size:0.75rem; color:var(--muted);">${label}</div>
      <div style="font-family:var(--font-mono); font-size:0.85rem; color:${color}; min-width:2rem; text-align:right;">${count}</div>
      <div style="font-size:0.7rem; color:var(--muted); min-width:2.5rem; text-align:right;">${pct}%</div>
    </div>
  `;
}

// ── DEEP WORK STATE ──
let dwState = 'idle';
let dwTotalSeconds = 0;
let dwFocusedSeconds = 0;
let dwTotalInterval = null;
let dwFocusInterval = null;
let dwStartedAt = null;
let dwCurrentSessionId = null;

function dwStart() {
  dwState = 'active';
  dwStartedAt = new Date();
  dwTotalSeconds = 0;
  dwFocusedSeconds = 0;
  dwTotalInterval = setInterval(() => { dwTotalSeconds++; renderDWTimers(); }, 1000);
  dwFocusInterval = setInterval(() => { dwFocusedSeconds++; }, 1000);
  dwCreateSession();
  renderDWState();
}

function dwPause() {
  if (dwState !== 'active') return;
  dwState = 'paused';
  clearInterval(dwFocusInterval);
  renderDWState();
}

function dwResume() {
  if (dwState !== 'paused') return;
  dwState = 'active';
  dwFocusInterval = setInterval(() => { dwFocusedSeconds++; }, 1000);
  renderDWState();
}

function dwEnd() {
  clearInterval(dwTotalInterval);
  clearInterval(dwFocusInterval);
  dwState = 'idle';
  showDWSummaryModal();
}

function renderDWTimers() {
  document.getElementById('dw-total').textContent = formatTime(dwTotalSeconds);
  document.getElementById('dw-focus').textContent = formatTime(dwFocusedSeconds);
  document.getElementById('dw-pause').textContent = formatTime(dwTotalSeconds - dwFocusedSeconds);
}

function renderDWState() {
  const idle = document.getElementById('dw-idle');
  const running = document.getElementById('dw-running');
  const pauseBtn = document.getElementById('dw-pause-btn');
  const statusEl = document.getElementById('dw-status-indicator');
  if (dwState === 'idle') {
    idle.classList.remove('hidden');
    running.classList.add('hidden');
  } else {
    idle.classList.add('hidden');
    running.classList.remove('hidden');
  }
  if (dwState === 'paused') {
    pauseBtn.textContent = '▶ WEITER';
    statusEl.style.color = 'var(--yellow)';
    statusEl.textContent = '⏸ PAUSIERT';
  } else {
    pauseBtn.textContent = '⏸ PAUSE';
    statusEl.style.color = 'var(--accent)';
    statusEl.textContent = '● AKTIV';
  }
}

function dwTogglePause() {
  if (dwState === 'active') dwPause();
  else if (dwState === 'paused') dwResume();
}

function showDWSummaryModal() {
  const pct = dwTotalSeconds > 0 ? Math.round((dwFocusedSeconds / dwTotalSeconds) * 100) : 0;
  document.getElementById('dw-summary-content').innerHTML = `
    <div style="display:flex; flex-direction:column; gap:0.75rem;">
      <div style="display:flex; justify-content:space-between;">
        <span style="color:var(--muted)">Gesamt</span>
        <span style="font-family:var(--font-mono)">${formatTime(dwTotalSeconds)}</span>
      </div>
      <div style="display:flex; justify-content:space-between;">
        <span style="color:var(--accent)">Fokus</span>
        <span style="font-family:var(--font-mono); color:var(--accent)">${formatTime(dwFocusedSeconds)} (${pct}%)</span>
      </div>
      <div style="display:flex; justify-content:space-between;">
        <span style="color:var(--muted)">Pause</span>
        <span style="font-family:var(--font-mono); color:var(--muted)">${formatTime(dwTotalSeconds - dwFocusedSeconds)} (${100 - pct}%)</span>
      </div>
      ${document.getElementById('dw-label-input').value ? `
      <div style="display:flex; justify-content:space-between;">
        <span style="color:var(--muted)">Label</span>
        <span>${document.getElementById('dw-label-input').value}</span>
      </div>` : ''}
    </div>
  `;
  document.getElementById('dw-summary-modal').classList.remove('hidden');
}

// ── OVERVIEW ──
async function loadOverview() {
  const today = new Date().toISOString().split('T')[0];
  const weekStart = getWeekStart();
  const monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];

  const [
    { data: dwToday },
    { data: trainToday },
    { data: callsToday },
    { data: contentWeek },
    { data: dwWeek },
    { data: allSessionsToday },
    { data: allSessionsWeek },
    { data: allSessionsMonth }
  ] = await Promise.all([
    SB.from('tracker_sessions').select('focused_seconds').eq('type','deep_work').eq('is_active',false).gte('started_at', today + 'T00:00:00+00:00'),
    SB.from('tracker_sessions').select('focused_seconds').eq('type','training').eq('is_active',false).gte('started_at', today + 'T00:00:00+00:00'),
    SB.from('crm_sessions').select('leads_played').gte('started_at', today + 'T00:00:00+00:00'),
    SB.from('tracker_content_log').select('type').gte('published_at', weekStart),
    SB.from('tracker_sessions').select('started_at, focused_seconds, type').eq('is_active',false).gte('started_at', weekStart + 'T00:00:00+00:00').order('started_at'),
    SB.from('tracker_sessions').select('total_seconds, focused_seconds').eq('is_active',false).gte('started_at', today + 'T00:00:00+00:00'),
    SB.from('tracker_sessions').select('total_seconds, focused_seconds').eq('is_active',false).gte('started_at', weekStart + 'T00:00:00+00:00'),
    SB.from('tracker_sessions').select('total_seconds, focused_seconds').eq('is_active',false).gte('started_at', monthStart + 'T00:00:00+00:00')
  ]);

  const dwTodayTotal = (dwToday || []).reduce((s, r) => s + (r.focused_seconds || 0), 0);
  const trainTodayTotal = (trainToday || []).reduce((s, r) => s + (r.focused_seconds || 0), 0);
  const callsTodayPlayed = (callsToday || []).reduce((s, r) => s + (r.leads_played || 0), 0);
  const contentCount = (contentWeek || []).length;

  function calcEffizienz(sessions) {
    const total   = (sessions || []).reduce((s, r) => s + (r.total_seconds   || 0), 0);
    const focused = (sessions || []).reduce((s, r) => s + (r.focused_seconds || 0), 0);
    const lost    = total - focused;
    const pct     = total > 0 ? Math.round((focused / total) * 100) : null;
    return { total, focused, lost, pct };
  }

  function effCol(label, eff) {
    const pctColor = eff.pct === null ? 'var(--muted)'
      : eff.pct >= 75 ? 'var(--green)'
      : eff.pct >= 55 ? 'var(--yellow)'
      : 'var(--red)';
    return `
      <div style="flex:1; text-align:center;">
        <div style="font-size:0.6rem; letter-spacing:0.1em; color:var(--muted); margin-bottom:0.6rem; text-transform:uppercase;">${label}</div>
        <div style="font-size:0.75rem; color:var(--accent); font-family:var(--font-mono); margin-bottom:0.25rem;">${formatTime(eff.focused)}</div>
        <div style="font-size:0.65rem; color:var(--red); font-family:var(--font-mono); margin-bottom:0.4rem;">${formatTime(eff.lost)} verloren</div>
        <div style="font-size:1rem; font-weight:700; color:${pctColor}; font-family:var(--font-mono);">${eff.pct !== null ? eff.pct + '%' : '—'}</div>
      </div>
    `;
  }

  function kpiCard(title, value, sub, color) {
    return `
      <div class="card" style="text-align:center;">
        <div style="font-size:0.6rem; letter-spacing:0.12em; color:var(--muted); text-transform:uppercase; margin-bottom:0.5rem;">${title}</div>
        <div style="font-family:var(--font-mono); font-size:1.5rem; color:${color}; line-height:1;">${value}</div>
        <div style="font-size:0.65rem; color:var(--muted); margin-top:0.25rem;">${sub}</div>
      </div>
    `;
  }

  const days = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
  const dwByDay = [0,0,0,0,0,0,0];
  const trainByDay = [0,0,0,0,0,0,0];
  (dwWeek || []).forEach(r => {
    const dayIdx = (new Date(r.started_at).getDay() + 6) % 7;
    if (r.type === 'deep_work') dwByDay[dayIdx] += (r.focused_seconds || 0);
    else trainByDay[dayIdx] += (r.focused_seconds || 0);
  });
  const maxSeconds = Math.max(...dwByDay.map((v, i) => v + trainByDay[i]), 1);
  const todayIdx = (new Date().getDay() + 6) % 7;
  const barsHtml = days.map((d, i) => {
    const dwH = Math.round((dwByDay[i] / maxSeconds) * 80);
    const trH = Math.round((trainByDay[i] / maxSeconds) * 80);
    const isToday = i === todayIdx;
    return `
      <div style="display:flex; flex-direction:column; align-items:center; gap:2px; flex:1;">
        <div style="display:flex; flex-direction:column; justify-content:flex-end; height:80px; width:100%; gap:2px;">
          ${dwH > 0 ? `<div style="background:var(--accent); height:${dwH}px; border-radius:3px 3px 0 0; opacity:0.9;"></div>` : ''}
          ${trH > 0 ? `<div style="background:var(--green); height:${trH}px; border-radius:${dwH > 0 ? '0' : '3px 3px 0 0'} 0 0;"></div>` : ''}
          ${dwH === 0 && trH === 0 ? `<div style="background:var(--border); height:3px; border-radius:2px; margin-top:auto;"></div>` : ''}
        </div>
        <div style="font-size:0.6rem; color:${isToday ? 'var(--accent)' : 'var(--muted)'}; letter-spacing:0.05em;">${d}</div>
      </div>
    `;
  }).join('');

  const effHeute = calcEffizienz(allSessionsToday);
  const effWoche = calcEffizienz(allSessionsWeek);
  const effMonat = calcEffizienz(allSessionsMonth);
  const dateStr = new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });

  document.getElementById('tab-overview').innerHTML = `
    <div style="margin-bottom:0.5rem; color:var(--muted); font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase;">
      ${dateStr}
    </div>
    <div class="card" style="margin-bottom:0.75rem;">
      <div class="section-title">EFFIZIENZ</div>
      <div style="display:flex; gap:0.25rem; align-items:flex-start;">
        ${effCol('Heute', effHeute)}
        <div style="width:1px; background:var(--border); align-self:stretch;"></div>
        ${effCol('Woche', effWoche)}
        <div style="width:1px; background:var(--border); align-self:stretch;"></div>
        ${effCol('Monat', effMonat)}
      </div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-bottom:1.25rem;">
      ${kpiCard('Deep Work', formatTime(dwTodayTotal), 'fokus', 'var(--accent)')}
      ${kpiCard('Training', formatTime(trainTodayTotal), 'aktiv', 'var(--green)')}
      ${kpiCard('Calls', callsTodayPlayed.toString(), 'gespielt', 'var(--text)')}
      ${kpiCard('Content', contentCount.toString(), 'diese Woche', 'var(--text)')}
    </div>
    <div class="card">
      <div class="section-title">DIESE WOCHE</div>
      <div style="display:flex; gap:0.5rem; align-items:flex-end; padding:0 0.25rem;">
        ${barsHtml}
      </div>
      <div style="display:flex; gap:1rem; margin-top:0.75rem;">
        <div style="display:flex; align-items:center; gap:0.35rem; font-size:0.65rem; color:var(--muted);">
          <div style="width:10px; height:10px; background:var(--accent); border-radius:2px;"></div>
          Deep Work
        </div>
        <div style="display:flex; align-items:center; gap:0.35rem; font-size:0.65rem; color:var(--muted);">
          <div style="width:10px; height:10px; background:var(--green); border-radius:2px;"></div>
          Training
        </div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
