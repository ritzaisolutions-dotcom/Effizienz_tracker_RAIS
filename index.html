<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RAIS Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* CSS VARIABLES */
    :root {
      --bg:       #0A0A0A;
      --surface:  #141618;
      --border:   #222426;
      --text:     #F0F0F0;
      --muted:    #888;
      --accent:   #C8FF00;
      --green:    #22C55E;
      --yellow:   #EAB308;
      --red:      #EF4444;
      --font-ui:  'Outfit', sans-serif;
      --font-mono:'Space Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      gap: 2rem;
    }

    .login-logo {
      font-family: var(--font-mono);
      font-size: 1.2rem;
      letter-spacing: 0.3em;
      color: var(--accent);
    }

    .login-form {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .login-form input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-form input:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 1rem;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:active { opacity: 0.7; }

    .login-error {
      color: var(--red);
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2em;
    }

    /* ── APP SHELL ── */
    #app-shell { display: none; }
    #app-shell.visible { display: block; }

    /* Top Bar */
    .topbar {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .topbar-logo {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: var(--accent);
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: var(--font-ui);
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-logout:hover { color: var(--text); border-color: var(--text); }

    /* Tab Content Area */
    .tab-content {
      padding: 1.25rem;
      padding-bottom: 6rem;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 200;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.65rem 0.25rem;
      cursor: pointer;
      gap: 0.25rem;
      border: none;
      background: none;
      color: var(--muted);
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-item svg { width: 20px; height: 20px; }
    .nav-item.active { color: var(--accent); }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── SHARED COMPONENTS ── */
    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-logo">RAIS TRACKER</div>
  <div class="login-form">
    <input type="email" id="login-email" placeholder="Email" autocomplete="email">
    <input type="password" id="login-password" placeholder="Passwort" autocomplete="current-password">
    <button class="btn-primary" onclick="handleLogin()">Einloggen</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell">
  <div class="topbar">
    <span class="topbar-logo">RAIS</span>
    <button class="btn-logout" onclick="handleLogout()">Logout</button>
  </div>

  <div class="tab-content">
    <div class="tab-panel active" id="tab-overview"><!-- Session 2 füllt das --></div>
    <div class="tab-panel" id="tab-deepwork"><!-- Session 2 füllt das --></div>
    <div class="tab-panel" id="tab-training"><!-- Session 3 füllt das --></div>
    <div class="tab-panel" id="tab-outreach"><!-- Session 3 füllt das --></div>
    <div class="tab-panel" id="tab-content"><!-- Session 4 füllt das --></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Overview
    </button>
    <button class="nav-item" data-tab="deepwork">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      Deep Work
    </button>
    <button class="nav-item" data-tab="training">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 4v16M18 4v16M3 8h18M3 16h18"/>
      </svg>
      Training
    </button>
    <button class="nav-item" data-tab="outreach">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
      </svg>
      Outreach
    </button>
    <button class="nav-item" data-tab="content">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      Content
    </button>
  </nav>
</div>

<script>
// ── SUPABASE INIT ──
const { createClient } = supabase;
const SB = createClient(
  'https://qdywaenmojdxhfxqbvun.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkeXdhZW5tb2pkeGhmeHFidnVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDYwMTYsImV4cCI6MjA5MDk4MjAxNn0.rfIzS2eY3yZCvap0pKdB7V-AfKmnvQLx_QLaFEi1gts'
);

// ── SHARED UTILITIES ──
function formatTime(s) {
  const h = Math.floor(s / 3600).toString().padStart(2, '0');
  const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${h}:${m}:${sec}`;
}

function getWeekStart() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(new Date().setDate(diff));
  return monday.toISOString().split('T')[0];
}

// ── AUTH ──
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  const { error } = await SB.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = 'Login fehlgeschlagen. Email oder Passwort falsch.';
  } else {
    showApp();
  }
}

async function handleLogout() {
  await SB.auth.signOut();
  document.getElementById('app-shell').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').classList.add('visible');
  initTabs();
  if (typeof loadOverview === 'function') loadOverview();
}

// ── TAB NAVIGATION ──
function initTabs() {
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    });
  });
}

// ── BOOT ──
SB.auth.getSession().then(({ data: { session } }) => {
  if (session) showApp();
});

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
